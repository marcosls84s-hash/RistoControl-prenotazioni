<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prenotazioni | Risto Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        input[type="date"]::-webkit-calendar-picker-indicator {
            background: transparent;
            bottom: 0;
            color: transparent;
            cursor: pointer;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            width: auto;
            height: auto;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen p-4 flex flex-col items-center">

    <div id="mainView" class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden hidden">
        <div class="bg-orange-500 p-8 text-white text-center">
            <h1 id="restaurantName" class="text-2xl font-bold uppercase tracking-widest text-white">RISTOCONTROL</h1>
            <p class="text-orange-100 text-sm mt-1 uppercase font-bold tracking-tighter">Prenotazione Tavolo Online</p>
        </div>

        <form id="reservationForm" class="p-6 space-y-6">
            <!-- Nome -->
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Nome Prenotazione</label>
                <input type="text" id="name" required class="w-full border-gray-200 border-2 p-4 rounded-2xl focus:border-orange-500 outline-none" placeholder="Esempio: Mario Rossi">
            </div>
            
            <!-- Persone -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Adulti</label>
                    <input type="number" id="adults" min="1" value="2" class="w-full border-gray-200 border-2 p-4 rounded-2xl outline-none focus:border-orange-500">
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Bambini</label>
                    <input type="number" id="children" min="0" value="0" class="w-full border-gray-200 border-2 p-4 rounded-2xl outline-none focus:border-orange-500">
                </div>
            </div>

            <!-- DATA (Grande e visibile) -->
            <div class="relative">
                <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Data della Prenotazione</label>
                <input type="date" id="date" required class="w-full border-gray-200 border-2 p-4 rounded-2xl outline-none focus:border-orange-500 bg-white text-lg font-bold">
            </div>

            <!-- FASCIA ORARIA -->
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Fascia Oraria</label>
                <select id="slot" class="w-full border-gray-200 border-2 p-4 rounded-2xl outline-none focus:border-orange-500 bg-white font-bold">
                    <option value="Cena">Cena</option>
                    <option value="Pranzo">Pranzo</option>
                </select>
            </div>

            <!-- Telefono -->
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Recapito Telefonico</label>
                <input type="tel" id="phone" required class="w-full border-gray-200 border-2 p-4 rounded-2xl outline-none focus:border-orange-500" placeholder="333 1234567">
            </div>

            <!-- Note -->
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Note Speciali</label>
                <textarea id="notes" rows="2" class="w-full border-gray-200 border-2 p-4 rounded-2xl outline-none focus:border-orange-500" placeholder="Allergie, seggioloni, compleanni..."></textarea>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-orange-500 text-white font-black py-5 rounded-2xl uppercase shadow-lg text-xl tracking-wider active:scale-95 transition-all">
                Conferma Prenotazione
            </button>

            <div class="text-center pt-2">
                <button type="button" onclick="showLogin()" class="text-orange-500 font-bold text-xs underline uppercase tracking-widest">Gestisci prenotazione esistente</button>
            </div>
        </form>
    </div>

    <!-- Modale Successo -->
    <div id="successModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-50">
        <div class="bg-white rounded-[40px] p-8 w-full max-w-sm text-center shadow-2xl">
            <div class="text-6xl mb-4">🎉</div>
            <h2 class="text-3xl font-black text-gray-800 leading-none">PRENOTAZIONE<br>RIUSCITA!</h2>
            <p class="text-gray-500 mt-4 text-sm px-4">Usa questo codice per modificare o annullare la tua prenotazione online:</p>
            
            <div class="relative group mt-6">
                <div id="displayCode" class="bg-orange-50 p-6 rounded-3xl text-4xl font-black tracking-[0.3em] text-orange-600 border-2 border-orange-200 mb-2 uppercase">------</div>
                <button onclick="copyToClipboard()" class="bg-black text-white px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-orange-500 transition-colors">
                    Copia Codice
                </button>
            </div>

            <button onclick="location.reload()" class="w-full mt-8 bg-gray-100 text-gray-800 py-4 rounded-2xl font-bold uppercase tracking-widest hover:bg-orange-500 hover:text-white transition-all">Ho salvato tutto</button>
        </div>
    </div>

    <!-- Login View -->
    <div id="loginView" class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 hidden text-center">
        <div class="mb-6">
            <div class="w-16 h-1 bg-orange-500 mx-auto mb-4 rounded-full"></div>
            <h2 class="text-2xl font-black uppercase">Gestione</h2>
        </div>
        <p class="text-gray-400 text-sm mb-6">Inserisci il codice della tua prenotazione</p>
        <input type="text" id="loginCode" maxlength="6" class="w-full border-gray-100 border-4 p-5 text-center text-3xl font-black rounded-3xl outline-none mb-8 uppercase text-orange-600 focus:border-orange-500" placeholder="ABCXYZ">
        <button onclick="checkCode()" class="w-full bg-black text-white py-5 rounded-2xl font-black uppercase shadow-xl tracking-widest">Verifica Codice</button>
        <button onclick="location.reload()" class="w-full mt-6 text-gray-300 font-bold uppercase text-[10px] tracking-widest">Torna Indietro</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://comandaristorante-facile-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const urlParams = new URLSearchParams(window.location.search);
        let restaurantId = urlParams.get('id');

        if (!restaurantId) {
            document.body.innerHTML = "<div class='text-center mt-20 p-10 bg-white rounded-3xl shadow-lg'><div class='text-4xl mb-4'>⚠️</div><h1 class='font-black uppercase text-red-500'>ID Locale Mancante</h1><p class='text-gray-400'>Scansiona il QR Code presente nel ristorante.</p></div>";
        } else {
            document.getElementById('mainView').classList.remove('hidden');
            document.getElementById('date').min = new Date().toISOString().split("T")[0];
            database.ref('restaurants/' + restaurantId + '/info/name').once('value').then(s => { 
                if(s.exists()) document.getElementById('restaurantName').innerText = s.val(); 
            });
        }

        document.getElementById('reservationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const mode = this.dataset.mode || 'create';
            const bookingId = this.dataset.bookingId;
            const code = this.dataset.code || Math.random().toString(36).substring(2, 8).toUpperCase();
            
            const data = {
                name: document.getElementById('name').value,
                adults: parseInt(document.getElementById('adults').value),
                children: parseInt(document.getElementById('children').value),
                date: document.getElementById('date').value,
                slot: document.getElementById('slot').value,
                phone: document.getElementById('phone').value,
                notes: document.getElementById('notes').value,
                reservationCode: code,
                status: "ACTIVE"
            };

            if (mode === 'create') {
                const resRef = await database.ref('restaurants/' + restaurantId + '/reservations').push(data);
                await database.ref('global_reservation_codes/' + code).set({ resId: restaurantId, bookingId: resRef.key });
                document.getElementById('displayCode').innerText = code;
                document.getElementById('successModal').classList.remove('hidden');
            } else {
                await database.ref('restaurants/' + restaurantId + '/reservations/' + bookingId).update(data);
                alert("Prenotazione Aggiornata con Successo!");
                location.reload();
            }
        });

        function showLogin() { document.getElementById('mainView').classList.add('hidden'); document.getElementById('loginView').classList.remove('hidden'); }

        function copyToClipboard() {
            const code = document.getElementById('displayCode').innerText;
            navigator.clipboard.writeText(code).then(() => {
                alert("Codice " + code + " copiato!");
            });
        }

        async function checkCode() {
            const code = document.getElementById('loginCode').value.trim().toUpperCase();
            if(code.length < 6) return;
            const snap = await database.ref('global_reservation_codes/' + code).once('value');
            if(!snap.exists()) { alert("Codice non valido o non trovato!"); return; }
            const info = snap.val();
            const bSnap = await database.ref('restaurants/' + info.resId + '/reservations/' + info.bookingId).once('value');
            if(!bSnap.exists()) return;
            const b = bSnap.val();
            const diff = new Date(b.date) - new Date();
            if (diff < (1000 * 60 * 60 * 24)) { alert("Non puoi modificare una prenotazione a meno di 24h dall'evento. Chiama il ristorante."); return; }
            document.getElementById('name').value = b.name;
            document.getElementById('adults').value = b.adults;
            document.getElementById('children').value = b.children;
            document.getElementById('date').value = b.date;
            document.getElementById('slot').value = b.slot;
            document.getElementById('phone').value = b.phone;
            document.getElementById('notes').value = b.notes || "";
            document.getElementById('btnSubmit').innerText = "Aggiorna Dati";
            document.getElementById('reservationForm').dataset.mode = "edit";
            document.getElementById('reservationForm').dataset.bookingId = info.bookingId;
            document.getElementById('reservationForm').dataset.code = code;
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('mainView').classList.remove('hidden');
        }
    </script>
</body>
</html>
