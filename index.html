<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prenotazioni | Risto Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen p-4 flex flex-col items-center">

    <div id="mainView" class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden hidden">
        <div class="bg-orange-500 p-8 text-white text-center">
            <h1 id="restaurantName" class="text-2xl font-bold uppercase tracking-widest">RISTOCONTROL</h1>
            <p class="text-orange-100 text-sm mt-1">Prenota il tuo tavolo</p>
        </div>

        <form id="reservationForm" class="p-6 space-y-4">
            <input type="text" id="name" required class="w-full border-gray-200 border-2 p-4 rounded-xl focus:border-orange-500 outline-none" placeholder="Nome Prenotazione">
            
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="adults" min="1" value="2" class="w-full border-gray-200 border-2 p-4 rounded-xl outline-none focus:border-orange-500" placeholder="Adulti">
                <input type="number" id="children" min="0" value="0" class="w-full border-gray-200 border-2 p-4 rounded-xl outline-none focus:border-orange-500" placeholder="Bambini">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <input type="date" id="date" required class="w-full border-gray-200 border-2 p-4 rounded-xl outline-none focus:border-orange-500">
                <select id="slot" class="w-full border-gray-200 border-2 p-4 rounded-xl outline-none">
                    <option value="Cena">Cena</option>
                    <option value="Pranzo">Pranzo</option>
                </select>
            </div>

            <input type="tel" id="phone" required class="w-full border-gray-200 border-2 p-4 rounded-xl outline-none focus:border-orange-500" placeholder="Cellulare">
            <textarea id="notes" rows="2" class="w-full border-gray-200 border-2 p-4 rounded-xl outline-none focus:border-orange-500" placeholder="Note (es. celiaci, allergie...)"></textarea>

            <button type="submit" id="btnSubmit" class="w-full bg-orange-500 text-white font-black py-5 rounded-2xl uppercase shadow-lg">Conferma Prenotazione</button>
            <div class="text-center pt-2"><button type="button" onclick="showLogin()" class="text-orange-500 font-bold text-sm underline uppercase">Gestisci prenotazione esistente</button></div>
        </form>
    </div>

    <!-- Modale Successo -->
    <div id="successModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-6 z-50">
        <div class="bg-white rounded-[40px] p-10 w-full max-w-sm text-center shadow-2xl">
            <div class="text-7xl mb-4">🎉</div>
            <h2 class="text-2xl font-black">INVIATA!</h2>
            <p class="text-gray-500 mt-2">Salva questo codice per modifiche future:</p>
            <div id="displayCode" class="my-6 bg-gray-100 p-6 rounded-3xl text-4xl font-black tracking-widest text-orange-600 border-2 border-orange-200">------</div>
            <button onclick="location.reload()" class="w-full bg-black text-white py-4 rounded-2xl font-bold uppercase tracking-widest">Ho salvato il codice</button>
        </div>
    </div>

    <!-- Schermata Login -->
    <div id="loginView" class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 hidden text-center">
        <h2 class="text-2xl font-black mb-6 uppercase">Gestione Prenotazione</h2>
        <input type="text" id="loginCode" maxlength="6" class="w-full border-gray-200 border-2 p-5 text-center text-3xl font-black rounded-2xl outline-none mb-6 uppercase" placeholder="ABCXYZ">
        <button onclick="checkCode()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-black uppercase">Verifica Codice</button>
        <button onclick="location.reload()" class="w-full mt-4 text-gray-400 font-bold uppercase text-xs">Annulla</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://comandaristorante-facile-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const urlParams = new URLSearchParams(window.location.search);
        let restaurantId = urlParams.get('id');

        if (!restaurantId) {
            document.body.innerHTML = "<div class='text-center mt-20 font-bold text-red-500'>ID Ristorante Non Valido</div>";
        } else {
            document.getElementById('mainView').classList.remove('hidden');
            document.getElementById('date').min = new Date().toISOString().split("T")[0];
            database.ref('restaurants/' + restaurantId + '/info/name').once('value').then(s => { if(s.exists()) document.getElementById('restaurantName').innerText = s.val(); });
        }

        document.getElementById('reservationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const mode = this.dataset.mode || 'create';
            const bookingId = this.dataset.bookingId;
            const code = this.dataset.code || Math.random().toString(36).substring(2, 8).toUpperCase();
            
            const data = {
                name: document.getElementById('name').value,
                adults: parseInt(document.getElementById('adults').value),
                children: parseInt(document.getElementById('children').value),
                date: document.getElementById('date').value,
                slot: document.getElementById('slot').value,
                phone: document.getElementById('phone').value,
                notes: document.getElementById('notes').value,
                reservationCode: code,
                status: "ACTIVE"
            };

            if (mode === 'create') {
                const resRef = await database.ref('restaurants/' + restaurantId + '/reservations').push(data);
                await database.ref('global_reservation_codes/' + code).set({ resId: restaurantId, bookingId: resRef.key });
                document.getElementById('displayCode').innerText = code;
                document.getElementById('successModal').classList.remove('hidden');
            } else {
                await database.ref('restaurants/' + restaurantId + '/reservations/' + bookingId).update(data);
                alert("Prenotazione Aggiornata!");
                location.reload();
            }
        });

        function showLogin() { document.getElementById('mainView').classList.add('hidden'); document.getElementById('loginView').classList.remove('hidden'); }

        async function checkCode() {
            const code = document.getElementById('loginCode').value.trim().toUpperCase();
            const snap = await database.ref('global_reservation_codes/' + code).once('value');
            if(!snap.exists()) { alert("Codice non trovato!"); return; }

            const info = snap.val();
            const bSnap = await database.ref('restaurants/' + info.resId + '/reservations/' + info.bookingId).once('value');
            if(!bSnap.exists()) return;
            const b = bSnap.val();

            // Limite 24 ore
            const diff = new Date(b.date) - new Date();
            if (diff < (1000 * 60 * 60 * 24)) { alert("Termini scaduti per la modifica online. Chiama il locale."); return; }

            restaurantId = info.resId; // Aggiorna ID se necessario
            document.getElementById('name').value = b.name;
            document.getElementById('adults').value = b.adults;
            document.getElementById('children').value = b.children;
            document.getElementById('date').value = b.date;
            document.getElementById('slot').value = b.slot;
            document.getElementById('phone').value = b.phone;
            document.getElementById('notes').value = b.notes;
            document.getElementById('btnSubmit').innerText = "Aggiorna Prenotazione";
            document.getElementById('reservationForm').dataset.mode = "edit";
            document.getElementById('reservationForm').dataset.bookingId = info.bookingId;
            document.getElementById('reservationForm').dataset.code = code;
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('mainView').classList.remove('hidden');
        }
    </script>
</body>
</html>
